<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Split-Flap Controller</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header">
    <h1>Split-Flap Controller</h1>
    <nav>
      <a href="{{ url_for('message_page') }}">Message</a>
      <a href="{{ url_for('config_page') }}">Configuration</a>
      <a href="{{ url_for('logs_page') }}">Console Log</a>
      <a href="{{ url_for('prop_clock_page') }}">Prop Clock</a>
    </nav>
  </header>

  <main class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-wrap">
          {% for msg in messages %}
            <div class="flash-msg">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
